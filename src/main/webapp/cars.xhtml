<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
>

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cars Details</title>
    <style>

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #1a237e;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }


        .car-table {
            width: 100%;
            border-collapse: collapse; /* Removes space between borders */
            margin-top: 1rem;
        }

        .car-table thead th {
            background-color: #3949ab;
            color: #ffffff;
            font-weight: 600;
            padding: 12px 15px;
            text-align: left;
        }

        .car-table tbody tr {
            border-bottom: 1px solid #dddddd;
        }

        .car-table tbody tr:nth-of-type(even) {
            background-color: #f3f3f3;
        }

        .car-table tbody tr:hover {
            background-color: #e8eaf6;
        }

        .car-table td {
            padding: 12px 15px;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Cars Details</h1>

    <div>

        <h:dataTable value="#{cars.carList}" var="car" styleClass="car-table" headerClass="table-header" rowClasses="table-row">

            <h:column >
                <f:facet name="header">Make</f:facet>
                <h:outputText value="#{car.make}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Model</f:facet>
                <h:outputText value="#{car.model}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Year</f:facet>
                <h:outputText value="#{car.year}"/>
            </h:column>

        </h:dataTable>
    </div>
</div>

</body>

</html>
