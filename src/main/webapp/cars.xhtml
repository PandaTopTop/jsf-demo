<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
>

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cars Details</title>
    <h:outputStylesheet name="css/car_styles.css" />
</h:head>
<body>

<div class="container">
    <h1>Cars Details</h1>

    <div>

        <h:dataTable value="#{cars.carList}" var="car" styleClass="car-table" headerClass="table-header" rowClasses="table-row">

            <h:column >
                <f:facet name="header">Make</f:facet>
                <h:outputText value="#{car.make}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Model</f:facet>
                <h:outputText value="#{car.model}"/>
            </h:column>

            <h:column>
                <f:facet name="header">Year</f:facet>
                <h:outputText value="#{car.year}"/>
            </h:column>

        </h:dataTable>
    </div>
</div>

</body>

</html>
