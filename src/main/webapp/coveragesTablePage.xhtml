<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
>

<h:head>
    <title>Coverages Details</title>
    <h:outputStylesheet name="css/style.css"/>
</h:head>
<h:body>

<h:form id="mainForm">
    <h:panelGrid columns="6">
    <h:outputLabel value="Id: "/>
    <h:inputText value="#{coverageBean.filterId}"/>

    <h:outputLabel value="Name:" />
    <h:inputText value="#{coverageBean.filterName}" />

        <h:outputLabel value="Limit From:" />
        <h:inputText value="#{coverageBean.filterMinLimit}" />
        <h:outputLabel value="To:" />
        <h:inputText value="#{coverageBean.filterMaxLimit}" />

        <h:outputLabel value="Premium From:" />
        <h:inputText value="#{coverageBean.filterMinPremium}" />
        <h:outputLabel value="To:" />
        <h:inputText value="#{coverageBean.filterMaxPremium}" />

        <h:outputLabel value="Status:" />
        <h:selectOneMenu value="#{coverageBean.filterActive}">
            <f:selectItem itemLabel="All" itemValue="#{null}" />
            <f:selectItem itemLabel="Active Only" itemValue="true" />
            <f:selectItem itemLabel="Inactive Only" itemValue="false" />
        </h:selectOneMenu>

    <h:commandButton value="Search" action="#{coverageBean.searchCoveragesWithFilter()}">
        <f:ajax execute="@form" render="resultsTable"/>
    </h:commandButton>
    </h:panelGrid>

    <p:commandButton value="Add New Coverage" icon="pi pi-plus"
                     actionListener="#{coverageBean.prepareNew}"
                     oncomplete="PF('itemDialog').show()"
                     update=":dialogForm" />
    <p:dataTable id="resultsTable" value="#{coverageBean.foundCoveragesList}" var="item"
                 emptyMessage="No coverages found with these filters">

        <p:column headerText="ID">
            <h:outputText value="#{item.coverageId}" />
        </p:column>

        <p:column headerText="Coverage Name">
            <h:outputText value="#{item.coverageName}" />
        </p:column>

        <p:column headerText="Limit ($)">
            <h:outputText value="#{item.limit}">
                <f:convertNumber type="currency" currencySymbol="$" />
            </h:outputText>
        </p:column>

        <p:column headerText="Premium ($)">
            <h:outputText value="#{item.premium}">
                <f:convertNumber type="currency" currencySymbol="$" />
            </h:outputText>
        </p:column>
        <p:column headerText="Active  ">
            <h:outputText value="#{item.active}"/>
        </p:column>
        <p:column headerText="Actions">
            <p:commandButton icon="pi pi-pencil"
                             update=":dialogForm"
                             oncomplete="PF('itemDialog').show()"
                             process="@this"
                             styleClass="rounded-button ui-button-flat">
                <f:setPropertyActionListener value="#{item}" target="#{coverageBean.selectedItem}" />
            </p:commandButton>

            <p:commandButton icon="pi pi-trash"
                             action="#{coverageBean.delete(item.coverageId)}"
                             update="resultsTable"
                             process="@this"
                             styleClass="rounded-button ui-button-danger ui-button-flat">
                <p:confirm header="Confirmation" message="Delete #{item.coverageName}?" icon="pi pi-info-circle" />
            </p:commandButton>
        </p:column>
    </p:dataTable>
</h:form>
    <p:dialog header="Coverage Details" widgetVar="itemDialog" modal="true" responsive="true">
        <h:form id="dialogForm">
            <h:panelGrid columns="3" cellpadding="5">
                <p:outputLabel for="name" value="Name:" />
                <p:inputText id="name" value="#{coverageBean.selectedItem.coverageName}"
                             required="true" maxlength="50" />
                <p:message for="name" />
                <p:outputLabel for="desc" value="Description:" />
                <p:inputText id="desc" value="#{coverageBean.selectedItem.coverageDescription}"
                             required="true" maxlength="50" />
                <p:message for="desc" />

                <p:outputLabel for="limit" value="Limit:" />
                <p:inputNumber id="limit" value="#{coverageBean.selectedItem.limit}"  required="true"/>
                <p:message for="limit" />

                <p:outputLabel for="premium" value="Premium:" />
                <p:inputNumber id="premium" value="#{coverageBean.selectedItem.premium}"  required="true"/>
                <p:message for="premium" />

                <p:outputLabel for="status" value="Active status:" />
                <p:selectOneButton id="status" value="#{coverageBean.selectedItem.active}">
                    <f:selectItem itemLabel="Yes" itemValue="true"/>
                    <f:selectItem itemLabel="No" itemValue="false" />
                </p:selectOneButton>
                <p:message for="status"/>

            </h:panelGrid>

            <p:commandButton value="Save" action="#{coverageBean.save}"
                             oncomplete="if (!args.validationFailed) PF('itemDialog').hide()"
                             update="dialogForm :mainForm:resultsTable"/>
        </h:form>
    </p:dialog>

    <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
        <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check" />
        <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times" />
    </p:confirmDialog>

</h:body>
</html>
